<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silver Factory | Influyentes</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="has-sidebar">
    
    <div id="bg-layer"></div>

    <nav class="sidebar">
        <div class="sidebar-logo">THE FACTORY</div>
        <ul class="sidebar-links">
            <li><a href="index.html" id="nav-home">Contexto</a></li>
            <li><a href="bands.html" id="nav-bands">Las Bandas</a></li>
            <li><a href="influential.html" class="active" id="nav-influential">Influyentes</a></li>
            <li><a href="chronicles.html" id="nav-chronicles">Crónicas</a></li>
        </ul>
        <div class="lang-selector sidebar-lang">
            <button class="lang-btn active" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="fr">FR</button>
        </div>
    </nav>

    <main class="main-content">
        <header class="page-header">
            <h1 id="main-title">Mentes Maestras</h1>
            <p id="main-subtitle">Productores, visionarios y musas que orquestaron la vanguardia.</p>
        </header>

        <div id="influential-grid" class="grid-container">
            <!-- Dynamically populated by JS -->
        </div>

        <div id="infl-modal" class="modal hidden">
            <div class="modal-content">
                <button id="close-modal" class="close-btn">&times;</button>
                <div class="modal-hero" style="height: 380px;">
                    <img id="modal-img" src="" alt="Person">
                    <div class="modal-hero-overlay">
                        <h2 id="modal-name">Name</h2>
                        <span id="modal-role">Role</span>
                    </div>
                </div>
                <div class="modal-body">
                    <p id="modal-bio" style="font-size: 1.25rem;"></p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/data_influential.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
