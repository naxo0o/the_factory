<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silver Factory | Bandas</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="has-sidebar">
    
    <div id="bg-layer"></div>

    <nav class="sidebar">
        <div class="sidebar-logo">THE FACTORY</div>
        <ul class="sidebar-links">
            <li><a href="index.html" id="nav-home">Contexto</a></li>
            <li><a href="bands.html" class="active" id="nav-bands">Las Bandas</a></li>
            <li><a href="influential.html" id="nav-influential">Influyentes</a></li>
            <li><a href="chronicles.html" id="nav-chronicles">Crónicas</a></li>
        </ul>
        <div class="lang-selector sidebar-lang">
            <button class="lang-btn active" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="fr">FR</button>
        </div>
    </nav>

    <main class="main-content">
        <header class="page-header">
            <h1 id="main-title">Las Bandas</h1>
            <p id="main-subtitle">Los arquitectos sonoros que devoraron la inocencia del pop.</p>
        </header>

        <div id="bands-grid" class="grid-container">
            <!-- Dynamically populated by JS -->
        </div>

        <div id="band-modal" class="modal hidden">
            <div class="modal-content">
                <button id="close-modal" class="close-btn">&times;</button>
                <div class="modal-hero">
                    <img id="modal-img" src="" alt="Band image">
                    <div class="modal-hero-overlay">
                        <h2 id="modal-name">Band Name</h2>
                        <span id="modal-years">1960-1970</span>
                    </div>
                </div>
                <div class="modal-body">
                    <h3 id="label-bio">Biografía</h3>
                    <p id="modal-bio"></p>
                    <h3 id="label-impact">Impacto</h3>
                    <p id="modal-impact"></p>
                    <h3 id="label-curiosities">Curiosidades</h3>
                    <ul id="modal-curiosities"></ul>
                </div>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
